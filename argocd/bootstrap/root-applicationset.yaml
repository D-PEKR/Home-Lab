---
# argocd/bootstrap/root-applicationset.yaml
# Erkennt automatisch jeden Ordner unter argocd/apps/ und
# erstellt daraus eine ArgoCD-Application.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-appset
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/D-PEKR/HomeLab.git
        revision: main
        directories:
          - path: argocd/apps/*
  template:
    metadata:
      name: "{{ .path.basename }}"
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/D-PEKR/HomeLab.git
        targetRevision: main
        path: "{{ .path.path }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .path.basename }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
