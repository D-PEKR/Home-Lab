# argocd/apps/traefik/values.yaml
# Traefik als Ingress-Controller mit MetalLB LoadBalancer-IP 192.168.178.200

traefik:
  # ── Service (MetalLB gibt uns die VIP) ──────────────────────
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.178.200"

  # ── Entrypoints ─────────────────────────────────────────────
  ports:
    web:
      port: 80
      exposedPort: 80
      redirectTo:
        port: websecure   # HTTP → HTTPS Redirect
    websecure:
      port: 443
      exposedPort: 443
      tls:
        enabled: true

  # ── Dashboard ────────────────────────────────────────────────
  ingressRoute:
    dashboard:
      enabled: true
      entryPoints:
        - websecure
      matchRule: Host(`traefik.pke-lab.de`)
      tls:
        secretName: traefik-dashboard-tls

  # ── Ingress für Dashboard mit cert-manager ──────────────────
  extraObjects:
    - apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: traefik-dashboard
        namespace: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
      spec:
        ingressClassName: traefik
        rules:
          - host: traefik.pke-lab.de
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: traefik
                      port:
                        number: 80
        tls:
          - secretName: traefik-dashboard-tls
            hosts:
              - traefik.pke-lab.de

  # ── Logs ─────────────────────────────────────────────────────
  logs:
    general:
      level: INFO
    access:
      enabled: true

  # ── Providers ────────────────────────────────────────────────
  providers:
    kubernetesIngress:
      publishedService:
        enabled: true

  # ── Tolerations für Verteilung auf beide Nodes ──────────────
  deployment:
    replicas: 2

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - traefik
            topologyKey: kubernetes.io/hostname
