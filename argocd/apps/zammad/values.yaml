# argocd/apps/zammad/values.yaml
# Zammad Helpdesk unter https://zammad.pke-lab.de

zammad:
  # ── Ingress ──────────────────────────────────────────────────
  ingress:
    enabled: true
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: zammad.pke-lab.de
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: zammad-tls
        hosts:
          - zammad.pke-lab.de

  # ── Zammad-Konfiguration ─────────────────────────────────────
  zammad:
    image:
      repository: ghcr.io/zammad/zammad
      tag: "6.3"  # Aktuell halten
    envVars:
      RAILS_TRUSTED_PROXIES: "['127.0.0.1', '::1']"
      ZAMMAD_FQDN: zammad.pke-lab.de
      ZAMMAD_WEBSOCKET_SSL: "true"

  # ── PostgreSQL ────────────────────────────────────────────────
  postgresql:
    enabled: true
    auth:
      postgresPassword: changeme-vault-encrypted   # → Sealed Secret
      database: zammad_production
    primary:
      persistence:
        enabled: true
        storageClass: local-path
        size: 10Gi

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    enabled: true
    auth:
      password: changeme-vault-encrypted   # → Sealed Secret

  # ── Elasticsearch ─────────────────────────────────────────────
  elasticsearch:
    enabled: true
    master:
      replicaCount: 1
      persistence:
        enabled: true
        storageClass: local-path
        size: 10Gi

  # ── Zammad-Persistence ────────────────────────────────────────
  persistence:
    enabled: true
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 20Gi
