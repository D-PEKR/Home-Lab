---
# argocd/apps/gitlab/pv-gitlab-data.yaml
# PersistentVolume mit hostPath auf Node 95 (HDD)
# nodeAffinity erzwingt Scheduling auf node-95.

apiVersion: v1
kind: PersistentVolume
metadata:
  name: gitlab-data-pv
  labels:
    app: gitlab
    node: node-95
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: gitlab-hdd
  hostPath:
    path: /mnt/hdd/gitlab/data
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - node-95

