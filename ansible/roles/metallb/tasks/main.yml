---
# roles/metallb/tasks/main.yml

- name: Install Python kubernetes library (Voraussetzung fuer k8s-Modul)
  ansible.builtin.pip:
    name:
      - kubernetes
      - PyYAML
      - jsonpatch
    state: present
    extra_args: --break-system-packages

- name: Check if Helm is installed
  ansible.builtin.stat:
    path: /usr/local/bin/helm
  register: helm_binary

- name: Install Helm
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  changed_when: true
  when:
    - not ansible_check_mode
    - not helm_binary.stat.exists

- name: Verify Helm binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/helm
  register: helm_binary_check
  failed_when:
    - not ansible_check_mode
    - not helm_binary_check.stat.exists

- name: Add MetalLB Helm repo
  kubernetes.core.helm_repository:
    name: metallb
    repo_url: https://metallb.github.io/metallb
    binary_path: /usr/local/bin/helm
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when:
    - not ansible_check_mode
    - helm_binary_check.stat.exists

- name: Install MetalLB via Helm
  kubernetes.core.helm:
    name: metallb
    chart_ref: metallb/metallb
    release_namespace: "{{ metallb_namespace }}"
    create_namespace: true
    wait: true
    binary_path: /usr/local/bin/helm
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  when:
    - not ansible_check_mode
    - helm_binary_check.stat.exists

- name: Wait for MetalLB controller to be ready
  ansible.builtin.shell: |
    kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml -n {{ metallb_namespace }} \
      rollout status deployment/metallb-controller --timeout=120s
  changed_when: false
  when:
    - not ansible_check_mode
    - helm_binary_check.stat.exists

- name: Apply MetalLB IPAddressPool
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: homelab-pool
        namespace: "{{ metallb_namespace }}"
      spec:
        addresses:
          - "{{ metallb_ip_pool }}"
  when:
    - not ansible_check_mode
    - helm_binary_check.stat.exists

- name: Apply MetalLB L2Advertisement
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: metallb.io/v1beta1
      kind: L2Advertisement
      metadata:
        name: homelab-l2
        namespace: "{{ metallb_namespace }}"
      spec:
        ipAddressPools:
          - homelab-pool
  when:
    - not ansible_check_mode
    - helm_binary_check.stat.exists