---
# roles/cert_manager/tasks/main.yml
# Installiert cert-manager + HTTP-01 ClusterIssuer für Let's Encrypt.

- name: Check if Helm is installed
  ansible.builtin.stat:
    path: /usr/local/bin/helm
  register: helm_binary

- name: Install Helm
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  changed_when: true
  when:
    - not ansible_check_mode
    - not helm_binary.stat.exists

- name: Add cert-manager Helm repo
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io
    binary_path: /usr/local/bin/helm
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: not ansible_check_mode

- name: Install cert-manager via Helm (with CRDs)
  kubernetes.core.helm:
    name: cert-manager
    chart_ref: jetstack/cert-manager
    chart_version: "{{ cert_manager_version | default(omit, true) }}"
    release_namespace: "{{ cert_manager_namespace }}"
    create_namespace: true
    binary_path: /usr/local/bin/helm
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    values:
      installCRDs: true
      replicaCount: 1
    wait: true
  when: not ansible_check_mode

- name: Wait for cert-manager webhook to be ready
  ansible.builtin.shell: |
    kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml -n {{ cert_manager_namespace }} \
      rollout status deployment/cert-manager-webhook --timeout=180s
  changed_when: false
  when: not ansible_check_mode

- name: Apply Let's Encrypt Production ClusterIssuer
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-prod
      spec:
        acme:
          server: "{{ letsencrypt_server }}"
          email: "{{ letsencrypt_email }}"
          privateKeySecretRef:
            name: letsencrypt-prod-account-key
          solvers:
            - http01:
                ingress:
                  ingressClassName: traefik
  when: not ansible_check_mode

- name: Apply Let's Encrypt Staging ClusterIssuer
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-staging
      spec:
        acme:
          server: https://acme-staging-v02.api.letsencrypt.org/directory
          email: "{{ letsencrypt_email }}"
          privateKeySecretRef:
            name: letsencrypt-staging-account-key
          solvers:
            - http01:
                ingress:
                  ingressClassName: traefik
  when: not ansible_check_mode
