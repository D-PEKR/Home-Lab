---
# roles/k3s_server/tasks/main.yml
# Installiert k3s als Control Plane + Worker auf Node 94.
# Traefik + servicelb deaktiviert – wir nutzen ArgoCD-Traefik + MetalLB.

- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: "0755"
  when:
    - not ansible_check_mode
    - not k3s_binary.stat.exists or auto_upgrade

- name: Install / upgrade k3s server
  ansible.builtin.shell: |
    INSTALL_K3S_CHANNEL={{ k3s_channel }} \
    K3S_TOKEN={{ k3s_token }} \
    /tmp/k3s-install.sh server \
      --cluster-cidr={{ k3s_cluster_cidr }} \
      --service-cidr={{ k3s_service_cidr }} \
      --flannel-backend={{ k3s_flannel_backend }} \
      --disable=traefik \
      --disable=servicelb \
      --node-ip={{ node_server_ip }} \
      --tls-san={{ node_server_ip }} \
      --write-kubeconfig-mode=644
  changed_when: true
  no_log: true
  when:
    - not ansible_check_mode
    - not k3s_binary.stat.exists or auto_upgrade

- name: Wait for k3s API to be reachable
  ansible.builtin.wait_for:
    port: 6443
    host: "{{ node_server_ip }}"
    timeout: 120
  when: not ansible_check_mode

- name: Wait for node to be Ready
  ansible.builtin.shell: |
    kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get nodes \
      --no-headers | grep -c " Ready"
  register: ready_nodes
  until: ready_nodes.stdout | int >= 1
  retries: 20
  delay: 10
  changed_when: false
  when: not ansible_check_mode

- name: Check if Helm is installed
  ansible.builtin.stat:
    path: /usr/local/bin/helm
  register: helm_binary

- name: Install Helm
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  changed_when: true
  when:
    - not ansible_check_mode
    - not helm_binary.stat.exists

- name: Ensure .kube directory exists for ansible_user
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/.kube
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Create kubeconfig for ansible user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/{{ ansible_user }}/.kube/config
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
    remote_src: true
  when: not ansible_check_mode

- name: Set KUBECONFIG in .bashrc
  ansible.builtin.lineinfile:
    path: /home/{{ ansible_user }}/.bashrc
    line: 'export KUBECONFIG=/etc/rancher/k3s/k3s.yaml'
    state: present

- name: Label server node
  ansible.builtin.shell: |
    kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml label node \
      $(hostname) node-role.kubernetes.io/worker=worker --overwrite
  changed_when: true
  when: not ansible_check_mode
